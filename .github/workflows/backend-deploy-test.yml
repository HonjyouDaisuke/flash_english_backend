name: Deploy Test Server

on:
  workflow_dispatch:

jobs:
  deploy-test:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout
      # =========================
      - name: Checkout Source
        uses: actions/checkout@v4

      # =========================
      # Setup PHP
      # =========================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer

      # =========================
      # Install / Test
      # =========================
      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Tests
        run: composer test

      # =========================
      # Build Deploy Package
      # =========================
      - name: Build Private Package
        run: |
          mkdir -p deploy-private
          cp -R src deploy-private/
          cp -R vendor deploy-private/
          cp -R bootstrap deploy-private/
          cp composer.json deploy-private/
          cp composer.lock deploy-private/

      - name: Build Public Package
        run: |
          mkdir -p deploy-public
          cp public/flash_english_backend/index.php deploy-public/
          cp public/flash_english_backend/.htaccess deploy-public/

      # =========================
      # Firebase Config (Secretから生成)
      # =========================
      - name: Build Firebase Config
        run: |
          mkdir -p deploy-config
          cat <<EOF > deploy-config/firebase.json
          ${{ secrets.FIREBASE_JSON_TEST }}
          EOF

      # =========================
      # Clean Remote Directories
      # config は残す
      # =========================
      - name: Clean Remote Directories
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SAKURA_HOST }}
          username: ${{ secrets.SAKURA_USER }}
          key: ${{ secrets.SAKURA_SSH_KEY }}
          port: 22
          script: |
            mkdir -p /home/kobe-football/flash_english_backend_test
            mkdir -p /home/kobe-football/flash_english_backend_test/config
            mkdir -p /home/kobe-football/www/flash_english_backend_test

            cd /home/kobe-football/flash_english_backend_test
            rm -rf src vendor bootstrap
            rm -f composer.json composer.lock

            cd /home/kobe-football/www/flash_english_backend_test
            rm -rf *

      # =========================
      # Deploy Private Area
      # =========================
      - name: Deploy Private App
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SAKURA_HOST }}
          username: ${{ secrets.SAKURA_USER }}
          key: ${{ secrets.SAKURA_SSH_KEY }}
          port: 22
          source: "deploy-private/*"
          target: "/home/kobe-football/flash_english_backend_test/"
          strip_components: 1
          overwrite: false

      # =========================
      # Deploy Public Area
      # =========================
      - name: Deploy Public Files
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SAKURA_HOST }}
          username: ${{ secrets.SAKURA_USER }}
          key: ${{ secrets.SAKURA_SSH_KEY }}
          port: 22
          source: "deploy-public/*"
          target: "/home/kobe-football/www/flash_english_backend_test/"
          strip_components: 1
          overwrite: false

      # =========================
      # Deploy Firebase Config
      # =========================
      - name: Deploy Firebase Config
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SAKURA_HOST }}
          username: ${{ secrets.SAKURA_USER }}
          key: ${{ secrets.SAKURA_SSH_KEY }}
          port: 22
          source: "deploy-config/firebase.json"
          target: "/home/kobe-football/flash_english_backend_test/config/"
          strip_components: 1
          overwrite: true
